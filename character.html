      <script>
         $(document).ready(function() {
           var last_player = 'kyu';
           var locked = false;
         
           var $chars = $('.rooster .character');
         
           $chars.mouseenter(function() {
             if (locked) return;
         
             var player = $(this).data('player');
         
             $chars.removeClass('selected');
             $(this).addClass('selected');
         
         const $playerOne = $('.player-one');
         const name = $(this).data('name');
         
         $('.char-name').text(name);
         
         $playerOne.removeClass(last_player + ' show');
         
         void $playerOne[0].offsetWidth;
         
         $playerOne.addClass(player + ' show');
         
             last_player = player;
           });
         
           $chars.click(function() {
             var player = $(this).data('player');
         
             if (locked && player === last_player) {
               locked = false;
               $chars.removeClass('locked');
               return;
             }
         
             locked = true;
         const name = $(this).data('name');
         
         $('.char-name').text(name);
             $chars.removeClass('selected locked');
             $(this).addClass('selected locked');
         
         const $playerOne = $('.player-one');
         
         $playerOne.removeClass(last_player + ' show');
         void $playerOne[0].offsetWidth;
         $playerOne.addClass(player + ' show');
         
             last_player = player;
           });
         
           $(document).click(function(e) {
             if (!$(e.target).closest('.character').length) {
               locked = false;
               $chars.removeClass('locked');
             }
           });
         });
      </script>
